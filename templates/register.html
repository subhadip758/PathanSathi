{% extends "base.html" %}{% block content %}<div class="row justify-content-center"><div class="col-md-6"><h2>Register</h2>
<form method="post"><div class="mb-2"><label>Email (username)</label><input class="form-control" name="username" required></div>
<div class="mb-2"><label>Password</label><input class="form-control" name="password" type="password" required></div>
<div class="mb-2"><label>Role</label><select name="role" class="form-select"><option value="user" selected>User</option><option value="admin">Admin</option></select></div>
<button class="btn btn-primary">Register</button></form><div class="mt-3"><small>Password rules: ≥8 chars, upper+lower+digit+special.</small></div></div></div>{% endblock %}
