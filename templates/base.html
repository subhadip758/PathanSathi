<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PathanSathi</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head><body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container"><a class="navbar-brand" href="{{ url_for('index') }}">PathanSathi</a>
<div class="ms-auto d-flex align-items-center">
  <button id="darkToggle" class="btn btn-sm btn-outline-light me-2">🌙</button>
  {% if session.username %}<a href="{{ url_for('dashboard') }}" class="btn btn-light btn-sm me-2">Dashboard</a><a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">Logout</a>{% else %}<a href="{{ url_for('login') }}" class="btn btn-light btn-sm me-2">Login</a><a href="{{ url_for('register') }}" class="btn btn-outline-light btn-sm">Register</a>{% endif %}
</div></div></nav>
<div class="container my-4">{% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for c,m in messages %}<div class="alert alert-{{ c }} alert-dismissible fade show">{{ m }}<button class="btn-close" data-bs-dismiss="alert"></button></div>{% endfor %}{% endif %}{% endwith %}{% block content %}{% endblock %}</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script></body></html>
